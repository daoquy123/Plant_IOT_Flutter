# Nginx reverse proxy for Plant IoT (Node on 127.0.0.1:3000)
# Copy to e.g. /etc/nginx/sites-available/five-small-snowflake.site
# then: sudo ln -s /etc/nginx/sites-available/five-small-snowflake.site /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# HTTP-only (before certbot): use the single server block in nginx-http-only.snippet (see PRODUCTION_VPS.md)

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream plant_iot_node {
  server 127.0.0.1:3000;
  keepalive 32;
}

# ACME + redirect to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name five-small-snowflake.site;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name five-small-snowflake.site;

  ssl_certificate     /etc/letsencrypt/live/five-small-snowflake.site/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/five-small-snowflake.site/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 12M;

  # API, uploads, health, static
  location / {
    proxy_pass http://plant_iot_node;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  # Socket.IO (Flutter + debug clients)
  location /socket.io/ {
    proxy_pass http://plant_iot_node;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
  }
}
